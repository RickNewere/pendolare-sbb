name: Notify profile stats

# Tells RickNewere/RickNewere to regenerate the profile README stats on every push.
# Requires a repo secret STATS_DISPATCH_TOKEN holding a PAT that can dispatch on
# RickNewere/RickNewere (fine-grained: Contents read/write on that repo, or classic "repo").

on:
  push:

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger profile README update
        env:
          TOKEN: ${{ secrets.STATS_DISPATCH_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/RickNewere/RickNewere/dispatches \
            -d '{"event_type":"refresh-stats"}'
