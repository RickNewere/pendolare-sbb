<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pendolare · Chiasso ⇄ Bioggio</title>
  <meta name="theme-color" content="#0b0f17">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <style>
    body { justify-content: center; align-items: center; gap: 22px; }
    .title { font-size: clamp(20px, 3vw, 32px); font-weight: 800; text-align: center; }
    .title small { display:block; font-weight:500; color: var(--text-dim); font-size: 0.55em; margin-top: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .choices { display: grid; gap: 16px; width: min(520px, 100%); }
    a.choice {
      display: flex; align-items: center; gap: 18px;
      background: linear-gradient(180deg, var(--bg-card), var(--bg-card-2));
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px 24px; text-decoration: none; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }
    a.choice img { width: 56px; height: 56px; border-radius: 14px; }
    a.choice .txt b { font-size: clamp(18px, 2.4vw, 24px); }
    a.choice .txt span { display:block; color: var(--text-dim); font-size: 14px; margin-top: 4px; }
    .hint { color: var(--text-dim); font-size: 13px; text-align: center; max-width: 520px; }
  </style>
</head>
<body>
  <div class="title">Pendolare Chiasso ⇄ Bioggio<small>Scegli la direzione</small></div>
  <div class="choices">
    <a class="choice" href="andata/">
      <img src="icon-andata-192.png" alt="">
      <div class="txt"><b>Chiasso → Bioggio</b><span>Andata · verso il lavoro</span></div>
    </a>
    <a class="choice" href="ritorno/">
      <img src="icon-ritorno-192.png" alt="">
      <div class="txt"><b>Bioggio → Chiasso</b><span>Ritorno · verso casa</span></div>
    </a>
  </div>
  <div class="hint">Su iPhone apri una delle due in Safari → Condividi → Aggiungi a Home. Ripeti per l'altra: avrai due icone separate.</div>
</body>
</html>
